    <h1 style="color: blue;">Spicy ground beef</h1>

    <h3>
        4 tablespoons of ground meat<br>
        1 teaspoon of smoked paprika<br>
        1 teaspoon of cayenne pepper<br>
        ⅛ tablespoon of salt or aromat<br>
        1 tablespoon of chilly oil<br>
        Break apart the meat during cooking<br>
        Cook until brown and no sign of raw meat chunks.
    </h3>
