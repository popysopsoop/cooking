  <body>

  <h1 style="blue:>Chilly oil ground beef</h1>

  <p>4 tablespoons of ground meat

1 teaspoon of smoked paprika

1 teaspoon of cayenne pepper

⅛ tablespoon of salt or aromat

1  tablespoon of chilly oil

Break apart the meat during cooking

Cook until brown and no sign of raw meat chunks.
</p>
